name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13.0-beta.3"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install poetry
      uses: abatilo/actions-poetry@v3
    - name: Dependencies
      run: |
        poetry config virtualenvs.create false
        poetry install
    - name: Lint
      run: |
        poe lint
    - name: Tests
      env:
        RTM_API_KEY: ${{ secrets.RTM_API_KEY }}
        RTM_SHARED_SECRET: ${{ secrets.RTM_SHARED_SECRET }}
        RTM_TOKEN: ${{ secrets.RTM_TOKEN }}
      if: ${{needs.secrets.outputs.valid}} == 'true'
      run: |
        if python --version | grep -q 'Python 3.13' ; then
          poe test-with-coverage
        fi
    - name: Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
